name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install linters
        run: pip install pyflakes

      - name: Syntax check — all Python files
        run: |
          find . -name "*.py" -not -path "./.git/*" | while read -r f; do
            python -m py_compile "$f" && echo "OK: $f"
          done

      - name: Pyflakes lint
        run: |
          pip install pyflakes
          python -m pyflakes window-groups.py lib/ integrations/

  shellcheck:
    name: Shellcheck install scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'install.sh'

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || \
          python -m unittest discover -s tests -v 2>/dev/null || \
          echo "No tests found — add tests/ directory to expand coverage"
